<!DOCTYPE html>
<html>
<head>
    <title>Banknote Authentication</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; background: #f5f5f5; }
        h1 { color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 20px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="range"] { width: 100%; }
        .value { text-align: right; color: #007bff; font-weight: bold; }
        button { background: #007bff; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 30px; padding: 30px; border-radius: 15px; font-size: 1.5em; display: none; }
        .authentic { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
        .fake { background: linear-gradient(135deg, #dc3545, #c82333); color: white; }
        .bill { font-size: 80px; margin: 20px 0; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💵 Banknote Authentication</h1>
        <p class="subtitle">Detect counterfeit bills using image-extracted features</p>
        
        <div class="input-group">
            <label>Variance: <span id="varianceVal">0</span></label>
            <input type="range" id="variance" min="-8" max="7" step="0.1" value="0" oninput="updateVal('variance')">
        </div>
        
        <div class="input-group">
            <label>Skewness: <span id="skewnessVal">0</span></label>
            <input type="range" id="skewness" min="-14" max="13" step="0.1" value="0" oninput="updateVal('skewness')">
        </div>
        
        <div class="input-group">
            <label>Kurtosis: <span id="kurtosisVal">0</span></label>
            <input type="range" id="kurtosis" min="-6" max="18" step="0.1" value="0" oninput="updateVal('kurtosis')">
        </div>
        
        <div class="input-group">
            <label>Entropy: <span id="entropyVal">0</span></label>
            <input type="range" id="entropy" min="-9" max="3" step="0.1" value="0" oninput="updateVal('entropy')">
        </div>
        
        <button onclick="predict()">Check Authenticity</button>
    </div>
    
    <div id="result">
        <div class="bill" id="billIcon">💵</div>
        <div id="predictionText"></div>
        <div id="confidenceText"></div>
    </div>
    
    <script>
        function updateVal(id) {
            document.getElementById(id + 'Val').textContent = document.getElementById(id).value;
        }
        
        async function predict() {
            const formData = new FormData();
            formData.append('variance', document.getElementById('variance').value);
            formData.append('skewness', document.getElementById('skewness').value);
            formData.append('kurtosis', document.getElementById('kurtosis').value);
            formData.append('entropy', document.getElementById('entropy').value);
            
            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            
            if (data.error) {
                resultDiv.className = 'fake';
                document.getElementById('billIcon').textContent = '❌';
                document.getElementById('predictionText').textContent = 'Error';
                document.getElementById('confidenceText').textContent = data.error;
            } else {
                resultDiv.className = data.prediction === 'AUTHENTIC' ? 'authentic' : 'fake';
                document.getElementById('billIcon').textContent = data.prediction === 'AUTHENTIC' ? '✅💵' : '❌💵';
                document.getElementById('predictionText').textContent = data.prediction;
                document.getElementById('confidenceText').textContent = `Confidence: ${data.confidence}`;
            }
        }
    </script>
</body>
</html>
